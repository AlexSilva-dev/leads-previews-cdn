services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./app:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ssh

  ssh:
    build:
      context: ./ssh
    ports:
      - "2222:22"
    volumes:
      - ./app:/app
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - SSH_PASSWORD=${SSH_PASSWORD:-password}
