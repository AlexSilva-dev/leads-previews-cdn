services:
  web:
    image: nginx:alpine
#    ports:
#      - "80:80"
    volumes:
      - ./app:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ssh

  ssh:
    image: ghcr.io/alexsilva-dev/leads-previews-cdn/ssh-server:latest
    ports:
      - "2222:22"
    volumes:
      - ./app:/app
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
    restart: always
