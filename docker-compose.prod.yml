services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - previews_data:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ssh

  ssh:
    image: ghcr.io/alexsilva-dev/leads-previews-cdn/ssh-server:latest
    ports:
      - "2222:22"
    volumes:
      - previews_data:/app
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - SSH_PASSWORD=${SSH_PASSWORD:-password}
    restart: always

volumes:
  previews_data:
